name: Build Windows Installer

on:
  workflow_dispatch:           # manual trigger
  push:
    tags:
      - 'v*'                   # also triggers on version tags

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar dependencies (Windows-compatible)
        # sqlcipher3 has no Windows wheels on PyPI. Skip it for the pilot —
        # db.py falls back to stdlib sqlite3 (no at-rest encryption) when the
        # import fails. Phase 4 (Ellen-PIN-derived keys) will need a real
        # Windows SQLCipher story (vcpkg / bundled DLL).
        shell: bash
        run: |
          cd app/sidecar
          # Don't `pip install --upgrade pip` — Windows runner errors out
          # demanding `python -m pip` form. Existing pip is fine.
          grep -v "^sqlcipher3" requirements.txt > requirements-no-sqlcipher.txt
          pip install -r requirements-no-sqlcipher.txt
          pip install pyinstaller

      - name: Download WeasyPrint Windows release (v68.1)
        # WeasyPrint has no usable Windows wheel — its native GTK/Pango/Cairo
        # deps aren't shippable through pip. Kozea publishes a standalone CLI
        # zip with the full dependency stack bundled. We download it, unpack,
        # and ship it next to the sidecar as a sibling Tauri resource. The
        # engine spawns it as a subprocess from
        # compliance_engine/report_generator.py:_render_to_pdf_via_subprocess.
        shell: bash
        run: |
          cd app/sidecar
          curl -L --fail -o weasyprint-windows.zip \
            https://github.com/Kozea/WeasyPrint/releases/download/v68.1/weasyprint-windows.zip
          unzip -q weasyprint-windows.zip -d weasyprint-zip
          mkdir -p weasyprint_bundle
          # The release zip contains a top-level dist/ folder with
          # weasyprint.exe and its native DLLs. Copy its contents verbatim.
          cp -r weasyprint-zip/dist/* weasyprint_bundle/
          ls weasyprint_bundle | head -20
          rm -rf weasyprint-zip weasyprint-windows.zip

      - name: Build sidecar with PyInstaller (--onedir)
        # Uses the existing backend.spec which already has the right
        # hidden-imports + binary collection set up. Output lands at
        # app/sidecar/dist/sidecar/sidecar.exe (+ supporting DLLs).
        shell: bash
        run: |
          cd app/sidecar
          pyinstaller backend.spec --noconfirm
          ls dist/sidecar | head -20

      - name: Stage sidecar + WeasyPrint bundles for Tauri
        # Tauri's bundle.resources expects binaries under
        # app/tauri/binaries/sidecar/**. lib.rs spawns binaries/sidecar/sidecar
        # via BaseDirectory::Resource at runtime.
        #
        # WeasyPrint ships as a sibling at binaries/weasyprint/weasyprint.exe
        # — the engine's _resolve_weasyprint_exe() looks for it relative to
        # the sidecar's location at runtime.
        shell: bash
        run: |
          mkdir -p app/tauri/binaries/sidecar
          cp -r app/sidecar/dist/sidecar/* app/tauri/binaries/sidecar/
          ls app/tauri/binaries/sidecar | head -20

          mkdir -p app/tauri/binaries/weasyprint
          cp -r app/sidecar/weasyprint_bundle/* app/tauri/binaries/weasyprint/
          echo "─── binaries/weasyprint/ contents ───"
          ls app/tauri/binaries/weasyprint | head -20
          test -f app/tauri/binaries/weasyprint/weasyprint.exe \
            || { echo "FAIL: weasyprint.exe not staged"; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd app/frontend
          npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + Tauri build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri app (NSIS installer)
        # Unsigned for the pilot. NSIS installer config:
        #   - installMode "currentUser" → per-user install to %LOCALAPPDATA%,
        #     no UAC prompt (asInvoker semantics).
        #   - webviewInstallMode "skip" → Ellen is on Windows 11; WebView2 is
        #     pre-installed, no bootstrapper download needed.
        # Both are set in app/tauri/tauri.conf.json under bundle.windows.
        shell: bash
        run: |
          cd app/tauri
          cargo tauri build --bundles nsis

      - name: List build output
        shell: bash
        run: |
          ls -la app/tauri/target/release/bundle/ || true
          ls -la app/tauri/target/release/bundle/nsis/ || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ness-ziona-installer-windows
          path: app/tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: error

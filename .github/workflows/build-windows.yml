name: Build Windows Installer

on:
  workflow_dispatch:           # manual trigger
  push:
    tags:
      - 'v*'                   # also triggers on version tags

permissions:
  contents: write          # softprops/action-gh-release needs write to create tags + releases

jobs:
  build-windows:
    runs-on: windows-latest
    # 30 min was tight even with caches warm — `cargo install tauri-cli`
    # alone compiled for 15-20 min on cold caches and we hit the wall
    # during NSIS build on run 27398687926. With cargo-binstall pulling
    # a prebuilt tauri-cli in seconds (see "Install Tauri CLI" step
    # below), 60 min is generous headroom for the Tauri NSIS build
    # itself.
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar dependencies (Windows-compatible)
        # sqlcipher3 has no Windows wheels on PyPI. Skip it for the pilot —
        # db.py falls back to stdlib sqlite3 (no at-rest encryption) when the
        # import fails. Phase 4 (Ellen-PIN-derived keys) will need a real
        # Windows SQLCipher story (vcpkg / bundled DLL).
        shell: bash
        run: |
          cd app/sidecar
          # Don't `pip install --upgrade pip` — Windows runner errors out
          # demanding `python -m pip` form. Existing pip is fine.
          grep -v "^sqlcipher3" requirements.txt > requirements-no-sqlcipher.txt
          pip install -r requirements-no-sqlcipher.txt
          pip install pyinstaller

      - name: Download WeasyPrint Windows release (v68.1)
        # WeasyPrint has no usable Windows wheel — its native GTK/Pango/Cairo
        # deps aren't shippable through pip. Kozea publishes a standalone CLI
        # zip with the full dependency stack bundled. We download it, unpack,
        # and ship it next to the sidecar as a sibling Tauri resource. The
        # engine spawns it as a subprocess from
        # compliance_engine/report_generator.py:_render_to_pdf_via_subprocess.
        shell: bash
        run: |
          cd app/sidecar
          curl -L --fail -o weasyprint-windows.zip \
            https://github.com/Kozea/WeasyPrint/releases/download/v68.1/weasyprint-windows.zip
          unzip -q weasyprint-windows.zip -d weasyprint-zip
          mkdir -p weasyprint_bundle
          # The release zip contains a top-level dist/ folder with
          # weasyprint.exe and its native DLLs. Copy its contents verbatim.
          cp -r weasyprint-zip/dist/* weasyprint_bundle/
          ls weasyprint_bundle | head -20
          rm -rf weasyprint-zip weasyprint-windows.zip

      - name: Build sidecar with PyInstaller (--onedir)
        # Uses the existing backend.spec which already has the right
        # hidden-imports + binary collection set up. Output lands at
        # app/sidecar/dist/sidecar/sidecar.exe (+ supporting DLLs).
        shell: bash
        run: |
          cd app/sidecar
          pyinstaller backend.spec --noconfirm
          ls dist/sidecar | head -20

      - name: Stage sidecar + WeasyPrint bundles for Tauri
        # Tauri's bundle.resources expects binaries under
        # app/tauri/binaries/sidecar/**. lib.rs spawns binaries/sidecar/sidecar
        # via BaseDirectory::Resource at runtime.
        #
        # WeasyPrint ships as a sibling at binaries/weasyprint/weasyprint.exe
        # — the engine's _resolve_weasyprint_exe() looks for it relative to
        # the sidecar's location at runtime.
        shell: bash
        run: |
          mkdir -p app/tauri/binaries/sidecar
          cp -r app/sidecar/dist/sidecar/* app/tauri/binaries/sidecar/
          ls app/tauri/binaries/sidecar | head -20

          mkdir -p app/tauri/binaries/weasyprint
          cp -r app/sidecar/weasyprint_bundle/* app/tauri/binaries/weasyprint/
          echo "─── binaries/weasyprint/ contents ───"
          ls app/tauri/binaries/weasyprint | head -20
          test -f app/tauri/binaries/weasyprint/weasyprint.exe \
            || { echo "FAIL: weasyprint.exe not staged"; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd app/frontend
          npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + Tauri build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-binstall
        # cargo-binstall pulls prebuilt binaries from upstream GitHub releases
        # instead of compiling from source. The setup action below downloads
        # binstall itself in seconds.
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI (prebuilt binary)
        # Previous "cargo install tauri-cli --locked" compiled from source —
        # 15-20 min on cold caches, the dominant cost in run 27398687926
        # which then ran out the 30-min job clock during the NSIS build.
        # `cargo binstall` fetches the official Tauri release binary from
        # https://github.com/tauri-apps/tauri/releases and finishes in <30s.
        # --no-confirm is required in CI (no interactive prompt available);
        # --locked tracks the same SemVer constraint we had before.
        run: cargo binstall --no-confirm --locked tauri-cli@^2

      - name: Build Tauri app (NSIS installer)
        # Unsigned for the pilot. NSIS installer config:
        #   - installMode "currentUser" → per-user install to %LOCALAPPDATA%,
        #     no UAC prompt (asInvoker semantics).
        #   - webviewInstallMode "skip" → Ellen is on Windows 11; WebView2 is
        #     pre-installed, no bootstrapper download needed.
        # Both are set in app/tauri/tauri.conf.json under bundle.windows.
        shell: bash
        run: |
          cd app/tauri
          cargo tauri build --bundles nsis

      - name: List build output
        shell: bash
        run: |
          ls -la app/tauri/target/release/bundle/ || true
          ls -la app/tauri/target/release/bundle/nsis/ || true

      - name: Boot smoke-test (sidecar on windows-latest — no SQLCipher)
        # Exercises the EXACT failure surface that broke Ellen's first install
        # (a SQLCipher-only PRAGMA crashed boot under the stdlib sqlite3
        # fallback). windows-latest has no SQLCipher wheel available, so this
        # is the same environment as a fresh user install. A green "build
        # succeeded" only proves bundling — this proves the app actually boots.
        # If the sidecar fails to respond on /health within 30s the release
        # step never runs (no broken installer ever reaches users).
        shell: pwsh
        run: |
          $exe = "app\tauri\binaries\sidecar\sidecar.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "FAIL: sidecar.exe not found at $exe"
            exit 1
          }

          $log = "sidecar-smoke.stdout.log"
          $err = "sidecar-smoke.stderr.log"
          # Isolate to a tempdir so the smoke test doesn't leave state under
          # the runner's %LOCALAPPDATA% (matters if anyone caches builds).
          $env:PLATFORM_DATA_DIR = Join-Path $env:RUNNER_TEMP "sidecar-smoke-data"
          New-Item -ItemType Directory -Force -Path $env:PLATFORM_DATA_DIR | Out-Null
          Write-Host "PLATFORM_DATA_DIR = $env:PLATFORM_DATA_DIR"

          $proc = Start-Process -FilePath $exe `
            -RedirectStandardOutput $log -RedirectStandardError $err `
            -NoNewWindow -PassThru
          Write-Host "Started sidecar.exe PID=$($proc.Id); polling /health for ≤30s"

          $deadline = (Get-Date).AddSeconds(30)
          $passed = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
            if ($proc.HasExited) {
              Write-Host "Sidecar exited early — code $($proc.ExitCode)"
              break
            }
            try {
              $resp = Invoke-WebRequest -UseBasicParsing `
                -Uri http://127.0.0.1:17321/health -TimeoutSec 2
              Write-Host "✓ /health responded $($resp.StatusCode) after $([int]((Get-Date) - $deadline.AddSeconds(-30)).TotalSeconds)s"
              $passed = $true
              break
            } catch {
              # Connection refused / not yet listening — loop and retry
            }
          }

          Write-Host "`n─── sidecar.exe stdout ───"
          if (Test-Path $log) { Get-Content $log } else { Write-Host "(no stdout captured)" }
          Write-Host "`n─── sidecar.exe stderr ───"
          if (Test-Path $err) { Get-Content $err } else { Write-Host "(no stderr captured)" }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

          if (-not $passed) {
            Write-Error "Boot smoke-test FAILED — sidecar did not respond to /health within 30s. See stdout/stderr above for the crash."
            exit 1
          }
          Write-Host "Boot smoke-test PASSED ✓"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ness-ziona-installer-windows
          path: app/tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: error

      - name: Compute release tag + title
        # Tag form: v<version>-<UTC-date>-<short-sha>, e.g.
        # v0.1.0-20260612-4dee986. We pull <version> from tauri.conf.json so
        # bumping the app version in one place flows through to the tag.
        # Outputs go to $GITHUB_ENV so the next step can read them.
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -oE '"version": *"[^"]+"' app/tauri/tauri.conf.json \
                    | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          short=$(git rev-parse --short HEAD)
          date_utc=$(date -u +%Y%m%d)
          date_display=$(date -u +%Y-%m-%d)
          tag="v${version}-${date_utc}-${short}"
          title="Planning Platform — Build ${date_display}"
          echo "RELEASE_TAG=${tag}"     >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=${title}" >> "$GITHUB_ENV"
          echo "Tag:   ${tag}"
          echo "Title: ${title}"

      - name: Create GitHub Release (pre-release)
        # Pre-release while we're still iterating on the pilot — the badge on
        # the releases page reads "Pre-release" so Ellen knows this isn't a
        # stamped 1.0. softprops/action-gh-release creates the git tag for
        # us; needs `contents: write` on the job (set at workflow root).
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          # Hebrew body — short install line for Ellen:
          # "Download the installer, run it, no admin permissions required."
          body: "הורד את קובץ ההתקנה, הפעל אותו, ואין צורך בהרשאות מנהל."
          files: app/tauri/target/release/bundle/nsis/*.exe
          prerelease: true
          fail_on_unmatched_files: true
